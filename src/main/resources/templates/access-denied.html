<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .error-card {
            background: white;
            color: #333;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="error-card p-5 text-center">
                    <div class="display-1 mb-4">🚫</div>
                    <h1 class="mb-3">Acceso Denegado</h1>
                    <p class="lead mb-4">
                        No tienes permisos para acceder a este recurso.
                    </p>
                    
                    <div class="alert alert-warning" role="alert">
                        <strong>Error 403:</strong> Forbidden
                    </div>

                    <p class="text-muted mb-4">
                        Este recurso requiere privilegios de administrador. 
                        Tu rol actual no tiene los permisos necesarios.
                    </p>

                    <div class="d-grid gap-2">
                        <a href="/public" class="btn btn-primary btn-lg">
                            🏠 Ir a Página Principal
                        </a>
                        <a href="/logout" class="btn btn-outline-secondary">
                            🔄 Cerrar Sesión e Intentar con Otro Usuario
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
