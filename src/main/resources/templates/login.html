<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Login - Security App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">🔐 Iniciar Sesión</h2>
                            <p class="text-muted">Ingresa tus credenciales</p>
                        </div>

                        <!-- Mensaje de error si el login falla -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <strong>¡Error!</strong> <span th:text="${errorMessage}">Usuario o contraseña incorrectos.</span>
                        </div>

                        <!-- Mensaje de logout -->
                        <div th:if="${logout}" class="alert alert-success" role="alert">
                            <strong>✓</strong> <span th:text="${logoutMessage}">Has cerrado sesión exitosamente.</span>
                        </div>

                        <!-- Formulario de login -->
                        <form th:action="@{/login}" method="POST">
                            <!-- Campo oculto CSRF Token (Thymeleaf lo agrega automáticamente) -->
                            
                            <div class="mb-3">
                                <label for="username" class="form-label">Usuario</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="username" 
                                       name="username" 
                                       placeholder="Ingresa tu usuario"
                                       required
                                       autofocus>
                                <div class="form-text">
                                    Usuarios de prueba: <strong>admin</strong> o <strong>user</strong>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       name="password" 
                                       placeholder="Ingresa tu contraseña"
                                       required>
                                <div class="form-text">
                                    Contraseñas: <strong>admin123</strong> o <strong>user123</strong>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Iniciar Sesión
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <a href="/public" class="text-decoration-none">
                                ← Volver a la página pública
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Información de credenciales de prueba -->
                <div class="card mt-3 bg-light">
                    <div class="card-body">
                        <h6 class="card-title">📝 Credenciales de prueba:</h6>
                        <ul class="mb-0 small">
                            <li><strong>Admin:</strong> admin / admin123</li>
                            <li><strong>Usuario:</strong> user / user123</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
