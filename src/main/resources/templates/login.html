<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="#{login.title} + ' - ' + #{app.title}">Login - Security App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <!-- Language Selector -->
                <div class="text-end mb-3">
                    <div class="dropdown">
                        <button class="btn btn-sm btn-outline-light dropdown-toggle" type="button" id="languageDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <span th:if="${#locale.toString() == 'es'}">🇪🇸 ES</span>
                            <span th:if="${#locale.toString() == 'en'}">🇺🇸 EN</span>
                            <span th:if="${#locale.toString() == 'pt'}">🇧🇷 PT</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
                            <li><a class="dropdown-item" th:href="@{/login(lang='es')}">🇪🇸 ES</a></li>
                            <li><a class="dropdown-item" th:href="@{/login(lang='en')}">🇺🇸 EN</a></li>
                            <li><a class="dropdown-item" th:href="@{/login(lang='pt')}">🇧🇷 PT</a></li>
                        </ul>
                    </div>
                </div>
                
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold" th:text="'🔐 ' + #{login.title}">🔐 Iniciar Sesión</h2>
                            <p class="text-muted" th:text="#{login.welcome}">Ingresa tus credenciales</p>
                        </div>

                        <!-- Mensaje de error si el login falla -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <strong>¡Error!</strong> <span th:text="#{login.error}">Usuario o contraseña incorrectos.</span>
                        </div>

                        <!-- Mensaje de logout -->
                        <div th:if="${logout}" class="alert alert-success" role="alert">
                            <span th:text="#{login.logout}">Has cerrado sesión correctamente.</span>
                        </div>

                        <!-- Formulario de login -->
                        <form th:action="@{/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            
                            <div class="mb-3">
                                <label for="username" class="form-label" th:text="#{login.username}">Usuario</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="username" 
                                       name="username" 
                                       th:placeholder="#{login.username}"
                                       required
                                       autofocus>
                                <div class="form-text">
                                    <em>admin</em> / <em>user</em>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label" th:text="#{login.password}">Contraseña</label>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       name="password" 
                                       th:placeholder="#{login.password}"
                                       required>
                                <div class="form-text">
                                    <em>admin123</em> / <em>user123</em>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg" th:text="#{login.submit}">
                                    Iniciar Sesión
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <a th:href="@{/public}" class="text-decoration-none" th:text="'← ' + #{common.backHome}">
                                ← Volver a la página pública
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Información de credenciales de prueba -->
                <div class="card mt-3 bg-light">
                    <div class="card-body">
                        <h6 class="card-title">📝 Credenciales de prueba:</h6>
                        <ul class="mb-0 small">
                            <li><strong>Admin:</strong> admin / admin123</li>
                            <li><strong>Usuario:</strong> user / user123</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
